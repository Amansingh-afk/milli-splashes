name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install neovim
        run: sudo apt-get update && sudo apt-get install -y neovim
      - name: Validate splashes + index
        run: nvim --headless --clean -l scripts/validate.lua
